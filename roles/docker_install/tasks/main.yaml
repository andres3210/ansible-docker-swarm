---
# Step 1: Remove conflicting packages
- name: Remove conflicting packages (podman, buildah, old docker)
  ansible.builtin.yum:
    name:
      - docker
      - docker-client
      - docker-client-latest
      - docker-common
      - docker-latest
      - docker-latest-logrotate
      - docker-logrotate
      - docker-engine
      - podman
      - buildah
      - runc
    state: absent
  when: ansible_os_family == "RedHat"

# Step 2: Install required packages
- name: Install prerequisite packages
  ansible.builtin.yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
      - python3
      - python3-pip
    state: present

# Step 3: Add Docker repository
- name: Add Docker CE repository
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: "Docker CE Stable - $basearch"
    baseurl: "https://download.docker.com/linux/centos/$releasever/$basearch/stable"
    gpgcheck: true
    gpgkey: "https://download.docker.com/linux/centos/gpg"
    enabled: true

# Step 4: Install Docker Engine
- name: Install Docker Engine and plugins
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

# Step 5: Create Docker configuration directory
- name: Ensure /etc/docker directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

# Step 6: Configure Docker daemon
- name: Write Docker daemon configuration
  ansible.builtin.template:
    src: "templates/docker_daemon.json.j2"
    dest: "/etc/docker/daemon.json"
    owner: 'root'
    group: 'root'
    mode: '0755'  # Optional file permissions
  notify: Restart Docker

# Step 7: Start and enable Docker
- name: Start and enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true

# Step 8: Add users to docker group
# - name: Add users to docker group
#   ansible.builtin.user:
#     name: "{{ item }}"
#     groups: docker
#     append: true
#   loop: "{{ docker_users }}"

# Step 9: Install Docker Python SDK
- name: Install Docker Python SDK
  ansible.builtin.pip:
    name:
      - docker
    state: present
    executable: pip3

# Step 10: Configure firewalld for Docker (if active)
- name: Check if firewalld is running
  ansible.builtin.systemd:
    name: firewalld
  register: firewalld_status
  ignore_errors: true

- name: Allow Docker through firewalld
  ansible.posix.firewalld:
    zone: trusted
    interface: docker0
    permanent: true
    state: enabled
  when:
    - firewalld_status.status is defined
    - firewalld_status.status.ActiveState == "active"
  notify: reload firewalld

# Step 11: Handle SELinux
- name: Check SELinux status
  ansible.builtin.command: getenforce
  register: selinux_status
  changed_when: false
  failed_when: false

- name: Install container-selinux if SELinux is enforcing
  ansible.builtin.yum:
    name: container-selinux
    state: present
  when: selinux_status.stdout == "Enforcing"

# Step 12: Verify installation
- name: Verify Docker is running
  ansible.builtin.command: docker info
  register: docker_info
  changed_when: false

- name: Show Docker version
  ansible.builtin.command: docker version --format '{{ "{{" }}.Server.Version{{ "}}" }}'
  register: docker_version
  changed_when: false

- name: Show Docker Compose version
  ansible.builtin.command: docker compose version --short
  register: compose_version
  changed_when: false

- name: Display installation results
  ansible.builtin.debug:
    msg: |
      Docker Engine: {{ docker_version.stdout }}
      Docker Compose: {{ compose_version.stdout }}
      Storage Driver: overlay2
      Installation complete on {{ ansible_hostname }}